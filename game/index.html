<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <title>Archery Master</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HUD Bar -->
  <div id="hud-bar">
    <div class="hud-left">
      <span class="hud-title">🏹 ARCHERY MASTER</span>
    </div>
    <div class="hud-right">
      <span class="hud-item lvl-icon">⚡ Lv.<span id="hud-level">1</span></span>
      <span class="hud-item" onclick="if(window.ShopUI){ShopUI.open();ShopUI.showTab('upgrades')}"><span class="lvl-icon">⚡</span></span>
      <span class="hud-item"><span class="coin-icon">🪙</span><span id="hud-coins">100</span></span>
      <span class="hud-item"><span class="gem-icon">💎</span><span id="hud-gems">0</span></span>
    </div>
  </div>

  <!-- Game Container -->
  <div id="game-container">
    <div id="game-info">
      <div class="info-box">
        <div class="label">Score</div>
        <div class="value" id="score-value">0</div>
      </div>
      <div id="round-display">Round 1/3</div>
      <div id="arrows-display">🏹 🏹 🏹 🏹 🏹</div>
      <div class="info-box">
        <div class="label">Level</div>
        <div class="value" id="level-display" style="color:var(--accent-blue);font-size:14px;">Lv.1</div>
      </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="button-bar">
      <button class="game-btn btn-primary" id="restart-btn">▶ Restart</button>
      <button class="game-btn btn-shop" id="button-shop">🛒 Shop</button>
      <button class="game-btn btn-upgrade" id="button-upgrade">⚡ Upgrade</button>
      <button class="game-btn btn-powerup" id="button-ach">🏆</button>
    </div>
  </div>

  <!-- Level Complete Overlay -->
  <div id="level-overlay">
    <div class="level-box">
      <h2 style="font-size:24px;margin-bottom:8px;">🏹 Level <span id="level-number">1</span></h2>
      <div id="level-result" style="font-size:18px;font-weight:700;margin-bottom:8px;color:var(--accent-gold);"></div>
      <div style="font-size:36px;font-weight:700;color:var(--accent-gold);" id="level-score">0</div>
      <div class="stat-row">
        <span>Bullseyes: <strong id="level-bullseyes">0</strong></span>
        <span>Best: <strong id="level-best">0</strong></span>
      </div>
      <div class="btn-group">
        <button class="game-btn btn-primary" id="next-level-btn">▶ Next Level</button>
        <button class="game-btn btn-restart" onclick="document.getElementById('level-overlay').classList.remove('visible');startLevel(1)">🔄 Retry</button>
      </div>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div id="game-over-overlay">
    <div class="game-over-box">
      <h2>Game Over</h2>
      <div class="final-score" id="final-score">0</div>
      <div class="btn-group">
        <button class="game-btn btn-primary" id="restart-btn2">▶ Play Again</button>
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div id="notification"></div>

  <!-- Scripts -->
  <script src="visuals.js"></script>
  <script src="progression.js"></script>
  <script src="shop.js"></script>
    <script src="ads-manager.js"></script>
  <script src="challenges-system.js"></script>
  <script src="store-rotator.js"></script>
  <script src="retention-system.js"></script>
  <script src="collectibles-system.js"></script>
  <script src="tutorial-system.js"></script>
  <script src="game.js"></script>
</body>
</html>
